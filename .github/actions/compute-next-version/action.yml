name: Compute the next version for a release track

#
# Computes the next version for either the stable or beta track from the
# existing git tags, which are treated as the single source of truth.
#
#   - stable: next minor after the latest stable tag (vX.Y.0 -> vX.(Y+1).0)
#   - beta:   vX.(Y+1).0-beta.N, where the base is the next minor after the
#             latest stable tag and N auto-increments from existing beta tags,
#             starting at 0 for the first prerelease of a base (SemVer style).
#
# Because the beta base is always derived from the latest stable tag, the
# moment a stable release is tagged the next beta computation rolls forward
# automatically. No shared state file is needed.
#
# The major version (vX) is read from the module path in go.mod, so a major
# bump (for example the /v2 -> /v3 module move) needs no change here: whatever
# major the module declares is the major this action releases against.
#

inputs:
  track:
    description: 'Release track: "stable" or "beta".'
    required: true

outputs:
  version:
    value: ${{ steps.compute.outputs.VERSION }}

runs:
  using: composite

  steps:
    - id: compute
      shell: bash
      run: |
        set -euo pipefail
        git fetch --tags --quiet

        # Derive the current major (vX) from the module path in go.mod so this
        # action never needs editing across a major bump. A go.mod path ends in
        # `/vN` from v2 onward; a v0/v1 module has no suffix, which maps to v1.
        MODULE=$(awk '/^module / {print $2; exit}' go.mod)
        MAJOR=$(printf '%s\n' "${MODULE}" | grep -oE '/v[0-9]+$' | tr -d '/v' || true)
        MAJOR=${MAJOR:-1}
        echo "::notice::compute-next-version: module=${MODULE} major=v${MAJOR}"

        # Only consider clean stable tags on the current major line (vX.MINOR.PATCH).
        # The strict anchored regex excludes other majors, any prerelease suffix
        # (-beta/-alpha/-rc/...), and stray non-release tags. `sort -V` orders by
        # semver so double-digit minors (vX.10.0 > vX.9.0) sort right. `|| true`
        # keeps a no-match grep (exit 1) from aborting the step under
        # `set -euo pipefail`; the explicit emptiness check below handles it.
        LATEST_STABLE=$(git tag --list | grep -E "^v${MAJOR}\.[0-9]+\.[0-9]+$" | sort -V | tail -1 || true)
        if [ -z "${LATEST_STABLE}" ]; then
          echo "::error::No stable v${MAJOR}.MINOR.PATCH tag found; cannot compute next version." >&2
          exit 1
        fi

        BASE=$(echo "${LATEST_STABLE}" | awk -F. '{printf "%s.%d.0", $1, $2+1}')

        if [ "${TRACK}" = "stable" ]; then
          VERSION="${BASE}"
          echo "::notice::compute-next-version (stable): latest_stable=${LATEST_STABLE} -> ${VERSION}"
        elif [ "${TRACK}" = "beta" ]; then
          # Only beta tags whose base is exactly BASE, with a numeric suffix.
          # The counter starts at 0 (SemVer style: vX.Y.0-beta.0 is the first
          # prerelease for a base), so default to -1 when no beta tag exists yet.
          # `|| true` keeps the no-match grep on the first beta (exit 1) from
          # aborting the step under `set -euo pipefail`.
          LAST_N=$(git tag --list | grep -E "^${BASE}-beta\.[0-9]+$" | sed -E 's/.*-beta\.//' | sort -n | tail -1 || true)
          N=$(( ${LAST_N:--1} + 1 ))
          VERSION="${BASE}-beta.${N}"
          echo "::notice::compute-next-version (beta): latest_stable=${LATEST_STABLE} base=${BASE} last_beta_n=${LAST_N:-<none>} -> ${VERSION}"
        else
          echo "::error::Unknown track '${TRACK}'. Expected 'stable' or 'beta'." >&2
          exit 1
        fi

        echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
      env:
        TRACK: ${{ inputs.track }}
